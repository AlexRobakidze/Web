<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка болезни по симптомам</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <header class="header">
        <h1>Проверка болезни</h1>
        <p>Выберите симптомы и получите возможный вариант диагноза</p>
    </header>

    <main class="main">
        <section class="card">
            <h2>Выберите симптомы:</h2>
            <div id="symptomsContainer" class="symptoms-container"></div>
        </section>

        <section class="card">
            <h2>Результат:</h2>
            <p id="resultText">Симптомы не выбраны</p>
            <p id="descriptionText"></p>
        </section>
        <div class="buttons">
            <button id="checkButton" class="main-button">Проверить</button>
            <button id="resetButton" class="second-button">Начать заново</button>
        </div>
    </main>

    <script src="script1.js"></script>
</body>
</html>
